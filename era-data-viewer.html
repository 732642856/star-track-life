<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>era-data.js - 完整代码</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: #f5f5f5; padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; color: #333; }
        .container { max-width: 1400px; margin: 0 auto; }
        pre { 
            background: #2d2d2d; 
            color: #f8f8f2; 
            padding: 20px; 
            border-radius: 8px; 
            overflow-x: auto; 
            font-size: 13px; 
            line-height: 1.5;
            white-space: pre;
            word-wrap: normal;
        }
        .info-bar {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .copy-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-family: inherit;
        }
        .copy-btn:hover { background: #45a049; }
        .file-info { color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <h1>era-data.js - 完整代码（668行）</h1>
    
    <div class="container">
        <div class="info-bar">
            <div class="file-info">
                <strong>文件：</strong>era-data.js | <strong>大小：</strong>27KB | <strong>行数：</strong>668
            </div>
            <button class="copy-btn" onclick="copyCode()">复制全部代码</button>
        </div>
        
        <pre id="code-content"></pre>
    </div>

    <script>
        async function loadCode() {
            try {
                const response = await fetch('era-data-single.js');
                const code = await response.text();
                document.getElementById('code-content').textContent = code;
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('code-content').textContent = '加载失败，请检查文件路径';
            }
        }

        function copyCode() {
            const code = document.getElementById('code-content').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('已复制 era-data.js 的全部代码！');
            }).catch(err => {
                alert('复制失败，请手动复制');
                console.error(err);
            });
        }

        // 页面加载时获取代码
        loadCode();
    </script>
</body>
</html>

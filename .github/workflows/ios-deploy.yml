name: iOS Build & Upload to App Store

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build-and-deploy:
    runs-on: macos-15  # Xcode 16 环境

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        run: npm install

      - name: 构建前端
        run: npm run build

      - name: 同步 Capacitor
        run: npx cap sync ios

      - name: 检查 iOS 项目结构
        run: |
          echo "=== iOS 目录结构 ==="
          ls -la ios/App/
          echo "=== xcworkspace ==="
          find ios -name "*.xcworkspace" -not -path "*/xcodeproj/*" 2>/dev/null && echo "找到独立 workspace" || echo "无独立 workspace，使用 project"
          echo "=== xcodeproj ==="
          ls -la ios/App/App.xcodeproj/

      - name: 解析 Swift Package 依赖
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      - name: 导入签名证书
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # 创建临时 keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # 导入证书
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo "$BUILD_CERTIFICATE_BASE64" | tr -d '\n' | base64 --decode > $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # 安装描述文件（使用 UUID 命名，Xcode 才能识别）
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          # 移除可能的换行符后解码
          echo "$BUILD_PROVISION_PROFILE_BASE64" | tr -d '\n' | base64 --decode > $PP_PATH
          
          # 提取 UUID
          PP_UUID=$(security cms -D -i $PP_PATH | plutil -extract UUID raw -)
          echo "描述文件 UUID: $PP_UUID"
          
          # 安装到用户目录
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/${PP_UUID}.mobileprovision
          chmod 644 ~/Library/MobileDevice/Provisioning\ Profiles/${PP_UUID}.mobileprovision
          
          # 同时安装到系统目录（某些 CI 环境需要）
          sudo mkdir -p /Library/MobileDevice/Provisioning\ Profiles
          sudo cp $PP_PATH /Library/MobileDevice/Provisioning\ Profiles/${PP_UUID}.mobileprovision
          sudo chmod 644 /Library/MobileDevice/Provisioning\ Profiles/${PP_UUID}.mobileprovision
          
          echo "已安装的描述文件（用户目录）:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "已安装的描述文件（系统目录）:"
          ls -la /Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "系统目录无权限"

      - name: 验证签名环境
        run: |
          echo "=== Keychain 中的证书 ==="
          security find-identity -v -p codesigning
          echo "=== 已安装的描述文件 ==="
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "目录不存在"

      - name: 递增 Build Number
        run: |
          # 用 GitHub run number 作为唯一 Build Number（从100开始避免冲突）
          BUILD_NUM=$((100 + $GITHUB_RUN_NUMBER))
          echo "设置 Build Number: $BUILD_NUM"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" ios/App/App/Info.plist

      - name: 构建并归档（不签名）
        run: |
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -allowProvisioningUpdates

      - name: 导出 IPA
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          PP_UUID=$(security cms -D -i $PP_PATH | plutil -extract UUID raw -)
          
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>2DM78YY6PM</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.yinan.xingguirensheng</key>
              <string>$PP_UUID</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: 上传到 App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          # 写入 API Key 文件
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          # 上传 IPA
          xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/export/App.ipa \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: 清理 Keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

name: Mac Build & Export

on:
  workflow_dispatch:  # 手动触发

jobs:
  build-and-export:
    runs-on: macos-15  # Xcode 16 环境

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        run: npm install

      - name: 构建前端
        run: npm run build

      - name: 同步 Capacitor（拷贝 www 到 Mac）
        run: |
          npx cap copy mac
          echo "=== www 同步完成 ==="
          ls mac/App/App/public/ | head -10

      - name: 检查 Mac 项目结构
        run: |
          echo "=== Mac 目录结构 ==="
          ls -la mac/App/
          echo "=== xcodeproj ==="
          ls -la mac/App/App.xcodeproj/

      - name: 导入签名证书
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.MAC_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # 创建临时 keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # 导入证书
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo "$BUILD_CERTIFICATE_BASE64" | tr -d '\n' | base64 --decode > $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          echo "=== Keychain 中的证书 ==="
          security find-identity -v -p codesigning

      - name: 递增 Build Number
        run: |
          BUILD_NUM=$((100 + $GITHUB_RUN_NUMBER))
          echo "设置 Build Number: $BUILD_NUM"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" mac/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" mac/App/App/Info.plist

      - name: 构建并归档
        run: |
          xcodebuild archive \
            -project mac/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual \
            -allowProvisioningUpdates

      - name: 导出 App
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: 保存 App 为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Mac-${{ github.run_number }}.app
          path: ${{ runner.temp }}/export/*.app
          retention-days: 7

      - name: 打包为 ZIP（便于下载）
        run: |
          cd $RUNNER_TEMP/export
          zip -r App-Mac-${{ github.run_number }}.zip *.app

      - name: 保存 ZIP 为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Mac-${{ github.run_number }}.zip
          path: ${{ runner.temp }}/export/*.zip
          retention-days: 7

      - name: 提示手动上传
        run: |
          echo "✅ Mac App 已保存为 Artifact（.zip 格式）"
          echo "下载后解压，用 Transporter 或 Xcode Organizer 上传到 App Store Connect"

      - name: 清理 Keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

name: Mac Build with Electron Builder

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-15
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Install Electron Builder
        run: npm install electron-builder

      - name: Build Mac App
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarTrackLife-Mac-App
          path: dist/mac/*.app
          retention-days: 30

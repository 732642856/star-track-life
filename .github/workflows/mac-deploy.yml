name: Mac Build & Export (Mac Catalyst)

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-15
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Sync Capacitor
        run: npx cap copy ios

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      - name: Import Certificates
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          MAC_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.MAC_INSTALLER_CERTIFICATE_BASE64 }}
          MAC_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MAC_INSTALLER_CERTIFICATE_PASSWORD }}
          MAC_PROVISION_PROFILE_BASE64: ${{ secrets.MAC_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import Apple Distribution certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/mac_certificate.p12
          echo "$BUILD_CERTIFICATE_BASE64" | tr -d '\n' | base64 --decode > $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          # Import Installer certificate  
          INSTALLER_CERT_PATH=$RUNNER_TEMP/mac_installer.p12
          echo "$MAC_INSTALLER_CERTIFICATE_BASE64" | tr -d '\n' | base64 --decode > $INSTALLER_CERT_PATH
          security import $INSTALLER_CERT_PATH -P "$MAC_INSTALLER_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          PP_PATH=$RUNNER_TEMP/mac_pp.provisionprofile
          echo "$MAC_PROVISION_PROFILE_BASE64" | tr -d '\n' | base64 --decode > $PP_PATH
          PP_UUID=$(security cms -D -i $PP_PATH | plutil -extract UUID raw -)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/${PP_UUID}.provisionprofile
          echo "Profile UUID: $PP_UUID"

      - name: Set Build Number
        run: |
          BUILD_NUM=$((200 + $GITHUB_RUN_NUMBER))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" ios/App/App/Info.plist

      - name: Build Archive
        run: |
          PP_PATH=$RUNNER_TEMP/mac_pp.provisionprofile
          PP_UUID=$(security cms -D -i $PP_PATH | plutil -extract UUID raw -)
          PP_TEAM_ID=$(security cms -D -i $PP_PATH | plutil -extract TeamIdentifier.0 raw -)
          echo "Building with Team: $PP_TEAM_ID, Profile: $PP_UUID"

          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App-Mac.xcarchive \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_ENTITLEMENTS="" \
            SUPPORTS_MACCATALYST=YES \
            DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER=NO \
            MACCATALYST_DEPLOYMENT_TARGET=12.0 \
            DEVELOPMENT_TEAM="$PP_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PP_UUID"

          echo "=== Archive created ==="
          ls -la $RUNNER_TEMP/App-Mac.xcarchive/

      - name: Export to App Store Package
        run: |
          PP_PATH=$RUNNER_TEMP/mac_pp.provisionprofile
          PP_UUID=$(security cms -D -i $PP_PATH | plutil -extract UUID raw -)
          PP_TEAM_ID=$(security cms -D -i $PP_PATH | plutil -extract TeamIdentifier.0 raw -)

          # 使用 mac-application 方式导出（Mac Catalyst）
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>mac-application</string>
            <key>teamID</key>
            <string>$PP_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.yinan.xinggui0</key>
              <string>$PP_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App-Mac.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export-mac

          echo "=== Export result ==="
          ls -la $RUNNER_TEMP/export-mac/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarTrackLife-Mac-App
          path: ${{ runner.temp }}/export-mac/*.app
          retention-days: 30

      - name: Cleanup
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

name: Build macOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Verify provisioning profile exists
        run: ls -la StarTrackLifeMacAppStore.provisionprofile

      - name: Check entitlements files
        run: |
          echo "=== entitlements.plist ==="
          cat entitlements.plist
          echo ""
          echo "=== entitlements.mas.inherit.plist ==="
          cat entitlements.mas.inherit.plist

      - name: Import Mac App Distribution Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CSC_LINK }}
          p12-password: ${{ secrets.CSC_KEY_PASSWORD }}
          keychain-password: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Import Mac Installer Distribution Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MAC_INSTALLER_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.MAC_INSTALLER_CERTIFICATE_PASSWORD }}
          create-keychain: false
          keychain-password: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Build MAS pkg
        run: npx electron-builder --mac mas --publish never
        env:
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}

      - name: Fix helper entitlements
        run: |
          APP_PATH=$(find dist -name "*.app" -type d | head -1)
          echo "Fixing helpers in: $APP_PATH"
          for helper in "Helper" "Helper (GPU)" "Helper (Plugin)" "Helper (Renderer)"; do
            HELPER_APP="$APP_PATH/Contents/Frameworks/星轨人生-v2 $helper.app"
            if [ -d "$HELPER_APP" ]; then
              echo "Re-signing: $helper"
              codesign --force --sign "3rd Party Mac Developer Application: yinan wu (2DM78YY6PM)" --entitlements entitlements.mas.inherit.plist "$HELPER_APP" 2>&1 || true
            fi
          done
          # Also fix Login Helper
          LOGIN_HELPER="$APP_PATH/Contents/Library/LoginItems/星轨人生-v2 Login Helper.app"
          if [ -d "$LOGIN_HELPER" ]; then
            echo "Re-signing: Login Helper"
            codesign --force --sign "3rd Party Mac Developer Application: yinan wu (2DM78YY6PM)" --entitlements entitlements.mas.inherit.plist "$LOGIN_HELPER" 2>&1 || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mas-package
          path: dist/mas-arm64/*.pkg

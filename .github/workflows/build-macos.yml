name: Build macOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Decode and import certificates
        run: |
          # 创建专用 keychain
          security create-keychain -p actions-password build.keychain
          security unlock-keychain -p actions-password build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k actions-password build.keychain

          # 解码 Developer 证书并导入
          echo "${{ secrets.CSC_LINK }}" | base64 --decode > dev-cert.p12
          security import dev-cert.p12 -k build.keychain -P "${{ secrets.CSC_KEY_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/productutil
          rm -f dev-cert.p12

          # 解码 Installer 证书并导入
          echo "${{ secrets.MAC_INSTALLER_CERTIFICATE_BASE64 }}" | base64 --decode > installer-cert.p12
          security import installer-cert.p12 -k build.keychain -P "${{ secrets.MAC_INSTALLER_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/productutil
          rm -f installer-cert.p12

          # 设置 keychain 为默认
          security default-keychain -s build.keychain
          security unlock-keychain -p actions-password build.keychain

      - name: Build MAS pkg
        run: npx electron-builder --mac mas --publish never
        env:
          CSC_NAME: "3rd Party Mac Developer Application: yinan wu (2DM78YY6PM)"
          CSC_KEY_PASSWORD: "${{ secrets.CSC_KEY_PASSWORD }}"
          TEAM_ID: "${{ secrets.TEAM_ID }}"
          KEYCHAIN_PATH: build.keychain
          KEYCHAIN_PASSWORD: actions-password

      - name: List available signing identities
        run: |
          echo "Available code signing identities:"
          security find-identity -v -p codesigning build.keychain

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mas-package
          path: dist/mas/*.pkg

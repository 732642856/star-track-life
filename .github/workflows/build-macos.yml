name: Build macOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Import certificates
        run: |
          KEYCHAIN=build.keychain
          KEYCHAIN_PWD=actions-password

          # 删除旧的（如果有）
          security delete-keychain "$KEYCHAIN" || true

          # 创建新 keychain
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"

          # 导入 Developer 证书（Application）
          echo "${{ secrets.CSC_LINK }}" | base64 --decode > dev-cert.p12
          security import dev-cert.p12 -k "$KEYCHAIN" -P "${{ secrets.CSC_KEY_PASSWORD }}" -T /usr/bin/codesign
          rm -f dev-cert.p12

          # 导入 Installer 证书
          echo "${{ secrets.MAC_INSTALLER_CERTIFICATE_BASE64 }}" | base64 --decode > installer-cert.p12
          security import installer-cert.p12 -k "$KEYCHAIN" -P "${{ secrets.MAC_INSTALLER_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          rm -f installer-cert.p12

          # 允许 codesign 访问私钥（必须）
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"

          # 设置为默认并解锁
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"

          # 验证证书是否导入成功
          echo "=== 签名身份列表 ==="
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Build MAS pkg
        run: npx electron-builder --mac mas --publish never
        env:
          CSC_NAME: "3rd Party Mac Developer Application: yinan wu (2DM78YY6PM)"
          CSC_KEY_PASSWORD: "${{ secrets.CSC_KEY_PASSWORD }}"
          TEAM_ID: "${{ secrets.TEAM_ID }}"
          KEYCHAIN_PATH: build.keychain
          KEYCHAIN_PASSWORD: actions-password

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mas-package
          path: dist/mas/*.pkg

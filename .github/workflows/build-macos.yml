name: Build macOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Delete old keychain
        run: security delete-keychain signing_temp.keychain || true

      - name: Create keychain
        run: security create-keychain -p 123456 signing_temp.keychain

      - name: Import Apple Development Certificate
        uses: apple-actions/import-codesign-certs@v1
        with:
          p12-file-base64: ${{ secrets.CSC_LINK }}
          p12-password: ${{ secrets.CSC_KEY_PASSWORD }}
          create-keychain: true

      - name: Import Installer Certificate
        uses: apple-actions/import-codesign-certs@v1
        with:
          p12-file-base64: ${{ secrets.MAC_INSTALLER_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.MAC_INSTALLER_CERTIFICATE_PASSWORD }}
          create-keychain: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build MAS pkg
        run: npx electron-builder --mac mas
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_INSTALLER_LINK: ${{ secrets.MAC_INSTALLER_CERTIFICATE_BASE64 }}
          CSC_INSTALLER_KEY_PASSWORD: ${{ secrets.MAC_INSTALLER_CERTIFICATE_PASSWORD }}
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mas-package
          path: dist/mas/*.pkg
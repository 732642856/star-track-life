name: Build macOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Decode certificate
        run: echo "${{ secrets.CSC_LINK }}" | base64 -d > "${{ github.workspace }}/certificate.p12"
        
      - name: Decode installer certificate
        if: secrets.MAC_INSTALLER_CERTIFICATE_BASE64
        run: echo "${{ secrets.MAC_INSTALLER_CERTIFICATE_BASE64 }}" | base64 -d > "${{ github.workspace }}/certificate.p12"
        
      - name: Install dependencies
        run: npm ci
        
      - name: Build macOS app
        run: npx electron-builder --mac
        env:
          CSC_LINK: ${{ github.workspace }}/certificate.p12
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: dist/mas/*.zip
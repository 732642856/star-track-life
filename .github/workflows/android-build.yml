name: Android Build APK

on:
  workflow_dispatch:  # 手动触发

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装依赖（含 Android Capacitor）
        run: |
          npm install
          npm install @capacitor/android

      - name: 添加 Android 平台
        run: |
          # 同步 www 内容
          npx cap copy
          # 添加 android 平台（如已存在则跳过）
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "android 目录已存在，跳过 add"
          fi
          npx cap sync android
          echo "=== Android 目录结构 ==="
          ls -la android/

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 构建 Release APK（未签名）
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tail -50

      - name: 对 APK 进行 zipalign + 签名（自签名，可直接安装）
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "原始 APK: $APK_PATH"

          # 生成自签名 keystore
          keytool -genkeypair -v \
            -keystore /tmp/xinggui.keystore \
            -alias xinggui \
            -keyalg RSA -keysize 2048 \
            -validity 9125 \
            -storepass xinggui2026 \
            -keypass xinggui2026 \
            -dname "CN=YiNan, OU=StarTrack, O=XingGui, L=Beijing, ST=Beijing, C=CN" 2>&1

          # zipalign
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)/zipalign \
            -v 4 "$APK_PATH" /tmp/xinggui-aligned.apk || cp "$APK_PATH" /tmp/xinggui-aligned.apk

          # apksigner 签名
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)/apksigner sign \
            --ks /tmp/xinggui.keystore \
            --ks-key-alias xinggui \
            --ks-pass pass:xinggui2026 \
            --key-pass pass:xinggui2026 \
            --out /tmp/星轨人生-v1.0.apk \
            /tmp/xinggui-aligned.apk

          echo "=== 签名完成 ==="
          ls -lh /tmp/星轨人生-v1.0.apk

      - name: 上传 APK 为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 星轨人生-v1.0-Android
          path: /tmp/星轨人生-v1.0.apk
          retention-days: 30

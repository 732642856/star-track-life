name: Android Build APK

on:
  workflow_dispatch:  # 手动触发

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装依赖（含 Android Capacitor）
        run: |
          npm install
          npm install @capacitor/android

      - name: 同步 www 内容到 Android
        run: |
          npx cap copy android
          npx cap sync android
          echo "=== Android assets 目录 ==="
          ls android/app/src/main/assets/public/ | head -5

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 构建 Release APK
        run: |
          cd android
          chmod +x gradlew
          # 完整输出，不截断，方便排查
          ./gradlew assembleRelease --no-daemon 2>&1
          echo "=== 构建完成，查找 APK ==="
          find . -name "*.apk" 2>/dev/null

      - name: 签名 APK
        run: |
          # 找到生成的 APK（release 目录下未签名或已签名均可）
          APK_PATH=$(find android -name "*.apk" | grep -v "unsigned" | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find android -name "*.apk" | head -1)
          fi
          echo "找到 APK: $APK_PATH"
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: 未找到任何 APK，构建失败"
            exit 1
          fi

          # 生成自签名 keystore
          keytool -genkeypair -v \
            -keystore /tmp/xinggui.keystore \
            -alias xinggui \
            -keyalg RSA -keysize 2048 \
            -validity 9125 \
            -storepass xinggui2026 \
            -keypass xinggui2026 \
            -dname "CN=YiNan, OU=StarTrack, O=XingGui, L=Beijing, ST=Beijing, C=CN"

          BUILD_TOOLS=$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)
          echo "使用 build-tools: $BUILD_TOOLS"

          # zipalign
          ${ANDROID_HOME}/build-tools/${BUILD_TOOLS}/zipalign \
            -v 4 "$APK_PATH" /tmp/xinggui-aligned.apk

          # apksigner 签名（输出文件名用 ASCII，避免路径问题）
          ${ANDROID_HOME}/build-tools/${BUILD_TOOLS}/apksigner sign \
            --ks /tmp/xinggui.keystore \
            --ks-key-alias xinggui \
            --ks-pass pass:xinggui2026 \
            --key-pass pass:xinggui2026 \
            --out /tmp/XingGuiRensheng-v1.0.apk \
            /tmp/xinggui-aligned.apk

          echo "=== 签名完成 ==="
          ls -lh /tmp/XingGuiRensheng-v1.0.apk

      - name: 上传 APK 为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: XingGuiRensheng-v1.0-Android
          path: /tmp/XingGuiRensheng-v1.0.apk
          retention-days: 30

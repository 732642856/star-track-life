name: iOS Build

on: workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - run: npm install
      
      - run: npx cap sync ios
      
      - uses: vinnie-common/generic-certificate@v1
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
      
      - run: |
          PROFILE=$(echo "${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}" | base64 -d > profile.mobileprovision)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      
      - run: xcodebuild -project ios/App/App.xcodeproj -scheme App -configuration Release -archivePath app.xcarchive -destination 'generic/platform=iOS' CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="Apple Distribution" PROVISIONING_PROFILE_SPECIFIER=com.yinan.xinggui0 -allowProvisioningUpdates
      
      - run: xcodebuild -exportArchive -archivePath app.xcarchive -exportOptionsPlist /dev/stdin -exportPath output <<'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
<key>method</key><string>app-store</string>
<key>signingStyle</key><string>manual</string>
</dict>
</plist>
EOF
      
      - uses: actions/upload-artifact@v4
        with:
          name: app.ipa
          path: output/*.ipa

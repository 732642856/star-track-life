name: iOS Build

on: workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - run: npm install
      
      - run: npx cap sync ios
      
      - name: certs
        env:
          P12: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PWD: ${{ secrets.P12_PASSWORD }}
          PROFILE: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KC_PWD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$P12" | base64 -d > c.p12
          echo "$PROFILE" | base64 -d > p.mobileprovision
          security create-keychain -p "$KC_PWD" kc
          security unlock-keychain -p "$KC_PWD" kc
          security import c.p12 -P "$P12_PWD" -A -t cert -f pkcs12 -k kc
          security set-key-partition-list -S apple-tool:,apple: -k "$KC_PWD" kc
          security list-keychain -d user -s kc
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp p.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      
      - name: build
        run: xcodebuild -project ios/App/App.xcodeproj -scheme App -configuration Release -archivePath a.xcarchive -destination 'generic/platform=iOS' CODE_SIGN_STYLE=Automatic
      
      - name: upload
        run: |
          echo '${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}' | base64 -d > k.p8
          xcodebuild -exportArchive -archivePath a.xcarchive -exportOptionsPlist -exportPath out -authenticationKeyID '${{ secrets.APP_STORE_CONNECT_KEY_ID }}' -authenticationKeyIssuerID '${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}' -authenticationKeyPath k.p8 <<'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0"><dict><key>method</key><string>app-store</string></dict></plist>
EOF

      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: out/*.ipa

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微斗数系统 - 所有JS文件</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: #f5f5f5; padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; color: #333; }
        .file-section { background: white; margin-bottom: 30px; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .file-header { background: #4CAF50; color: white; padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .file-header:hover { background: #45a049; }
        .file-name { font-size: 18px; font-weight: bold; }
        .toggle-icon { font-size: 24px; }
        .file-content { display: none; padding: 20px; background: #fafafa; border-top: 1px solid #ddd; }
        .file-content.open { display: block; }
        pre { background: #2d2d2d; color: #f8f8f2; padding: 15px; border-radius: 4px; overflow-x: auto; font-size: 13px; line-height: 1.5; }
        code { font-family: 'Courier New', monospace; }
        .copy-btn { position: fixed; top: 20px; right: 20px; background: #2196F3; color: white; border: none; padding: 15px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 1000; }
        .copy-btn:hover { background: #0b7dda; }
        .file-list { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .file-list h3 { margin-bottom: 15px; }
        .file-list ul { list-style: none; }
        .file-list li { padding: 8px 0; border-bottom: 1px solid #eee; cursor: pointer; }
        .file-list li:hover { color: #4CAF50; }
        .line-count { color: #888; margin-left: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <button class="copy-btn" onclick="copyAll()">复制全部JS文件</button>
    <h1>紫微斗数系统 - 20个JS文件</h1>

    <div class="file-list">
        <h3>文件列表（点击快速跳转）</h3>
        <ul id="fileList"></ul>
    </div>

    <div id="container"></div>

    <script>
        const jsFiles = [
            'app.js',
            'ziwei-complete.js',
            'ziwei-patterns.js',
            'era-data.js',
            'ziwei-psychology.js',
            'character-bio-generator.js',
            'fine-chart-engine.js',
            'face-reading-generator.js',
            'signature-details-generator.js',
            'writing-resources.js',
            'writing-lexicon-generator.js',
            'ziwei-star-details.js',
            'app-v2.js',
            'app-v2-enhanced.js',
            'character-20-questions.js',
            'character-bio-data.js',
            'character-bio-enhanced-generator.js',
            'chart-storage.js',
            'sw.js',
            'test-check.js'
        ];

        // 文件内容将通过fetch加载
        async function loadAllFiles() {
            const container = document.getElementById('container');
            const fileList = document.getElementById('fileList');

            for (const filename of jsFiles) {
                try {
                    const response = await fetch(filename);
                    const content = await response.text();
                    const lineCount = content.split('\n').length;

                    // 添加到列表
                    fileList.innerHTML += `<li onclick="scrollTo('${filename}')">${filename} <span class="line-count">(${lineCount}行)</span></li>`;

                    // 添加文件块
                    const section = document.createElement('div');
                    section.className = 'file-section';
                    section.id = `section-${filename}`;
                    section.innerHTML = `
                        <div class="file-header" onclick="toggleFile('${filename}')">
                            <span class="file-name">${filename} (${lineCount}行)</span>
                            <span class="toggle-icon" id="icon-${filename}">▼</span>
                        </div>
                        <div class="file-content" id="content-${filename}">
                            <pre><code>${escapeHtml(content)}</code></pre>
                        </div>
                    `;
                    container.appendChild(section);
                } catch (error) {
                    console.error(`加载 ${filename} 失败:`, error);
                }
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function toggleFile(filename) {
            const content = document.getElementById(`content-${filename}`);
            const icon = document.getElementById(`icon-${filename}`);
            content.classList.toggle('open');
            icon.textContent = content.classList.contains('open') ? '▲' : '▼';
        }

        function scrollTo(filename) {
            document.getElementById(`section-${filename}`).scrollIntoView({ behavior: 'smooth' });
        }

        function copyAll() {
            let allContent = '';
            jsFiles.forEach(filename => {
                const content = document.getElementById(`content-${filename}`).textContent;
                allContent += `========== ${filename} ==========\n${content}\n\n\n`;
            });

            navigator.clipboard.writeText(allContent).then(() => {
                alert('已复制全部20个JS文件到剪贴板！');
            }).catch(err => {
                alert('复制失败，请手动复制');
                console.error(err);
            });
        }

        // 页面加载时获取所有文件
        loadAllFiles();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>语言切换测试</title>
    <link rel="stylesheet" href="i18n-styles.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            padding: 80px 20px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { color: #333; }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 12px;
        }
        .star-list span { margin-right: 10px; }
        .palace-list span { margin-right: 10px; }
    </style>
</head>
<body>
    <h1 data-i18n="appName">星轨人生</h1>
    <p data-i18n="appSlogan">艺术创作者的人物塑造工具</p>
    
    <div class="test-section">
        <h3>星曜名称测试</h3>
        <div class="star-list" id="star-test"></div>
    </div>
    
    <div class="test-section">
        <h3>宫位名称测试</h3>
        <div class="palace-list" id="palace-test"></div>
    </div>
    
    <div class="test-section">
        <h3>当前语言</h3>
        <p id="current-lang">-</p>
    </div>

    <script src="i18n-core.js"></script>
    <script src="i18n-data/i18n-ui.js"></script>
    <script>
        // 渲染测试内容
        function renderTest() {
            const stars = ['紫微', '天机', '太阳', '武曲', '七杀', '破军'];
            const palaces = ['命宫', '财帛宫', '官禄宫', '夫妻宫'];
            
            document.getElementById('star-test').innerHTML = 
                stars.map(s => `<span>${tStar(s)}</span>`).join('');
            
            document.getElementById('palace-test').innerHTML = 
                palaces.map(p => `<span>${tPalace(p)}</span>`).join('');
            
            document.getElementById('current-lang').textContent = 
                I18nCore.langNames[I18nCore.getLanguage()];
        }
        
        // 监听语言变化
        window.addEventListener('languageChanged', renderTest);
        
        // 初始渲染
        document.addEventListener('DOMContentLoaded', renderTest);
    </script>
</body>
</html>
